openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Strapivo JSON API
  version: 1.3.0
  description: |
    Machine-readable wire contract for Strapivo's external bearer-authenticated JSON API.
    Routes are shared with the browser application and are not namespaced under `/api`.

    Workspace-scoped resources are always resolved through the workspace selected by
    `workspace_slug`. Resources outside that workspace are not exposed by resource lookups.
servers:
  - url: https://strapivo.example
    description: Example deployment; clients use the URL of their Strapivo installation.
security:
  - bearerAuth: []
tags:
  - name: Workspaces
  - name: Business Models
  - name: Business Model Elements
  - name: Business Model Environment
  - name: Business Model Streams
paths:
  /workspaces.json:
    get:
      operationId: listWorkspaces
      summary: List accessible workspaces
      description: |
        Lists the workspaces belonging to the user identified by the bearer token.
        Use each workspace's `path` or opaque `business_models_url` for subsequent requests.
      tags: [Workspaces]
      responses:
        "200":
          description: Workspaces available to the authenticated user, ordered by name.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /{workspace_slug}/business_models.json:
    parameters:
      - $ref: "#/components/parameters/WorkspaceSlug"
    get:
      operationId: listBusinessModels
      summary: List business models
      description: Lists business models in the selected workspace, most recently updated first.
      tags: [Business Models]
      responses:
        "200":
          description: Business Model directory entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BusinessModelDirectoryEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createBusinessModel
      summary: Create a business model
      description: |
        Creates a Business Model in the selected workspace. This operation is not
        idempotent and does not support idempotency keys. Clients must not automatically
        retry it after an ambiguous network failure.
      tags: [Business Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessModelCreateRequest"
      responses:
        "201":
          description: Business Model created.
          headers:
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessModelDocument"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /{workspace_slug}/business_models/{business_model_id}.json:
    parameters:
      - $ref: "#/components/parameters/WorkspaceSlug"
      - $ref: "#/components/parameters/BusinessModelId"
    get:
      operationId: getBusinessModel
      summary: Read a business model
      description: Returns the complete current Business Model document with all nine Canvas blocks.
      tags: [Business Models]
      responses:
        "200":
          description: Complete Business Model document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessModelDocument"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateBusinessModel
      summary: Update a business model
      description: |
        Updates mutable Business Model metadata. `lock_version` must come from the latest
        read. A stale version returns `409`; read the resource again before retrying.
        Omitted nullable metadata is treated as null by the current implementation, so
        clients should send the complete mutable metadata set.
      tags: [Business Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessModelUpdateRequest"
      responses:
        "200":
          description: Updated complete Business Model document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessModelDocument"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /{workspace_slug}/business_models/{business_model_id}/elements.json:
    parameters:
      - $ref: "#/components/parameters/WorkspaceSlug"
      - $ref: "#/components/parameters/BusinessModelId"
    post:
      operationId: createBusinessModelElement
      summary: Create a business model element
      description: |
        Creates either a top-level Canvas element or a supported child beneath a top-level
        Customer Segment or Value Proposition. Creates are not idempotent and must omit
        `lock_version`. New elements are created with `proposed` status.
      tags: [Business Model Elements]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessModelElementCreateRequest"
      responses:
        "201":
          description: Business Model Element created.
          headers:
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessModelElementDocument"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /{workspace_slug}/business_models/{business_model_id}/elements/{element_id}.json:
    parameters:
      - $ref: "#/components/parameters/WorkspaceSlug"
      - $ref: "#/components/parameters/BusinessModelId"
      - $ref: "#/components/parameters/ElementId"
    get:
      operationId: getBusinessModelElement
      summary: Read a business model element
      description: |
        Returns a current element and its unarchived children grouped by child type.
        Archived elements are outside this current projection and return `404`.
      tags: [Business Model Elements]
      responses:
        "200":
          description: Complete Business Model Element document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessModelElementDocument"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateBusinessModelElement
      summary: Update a business model element
      description: |
        Updates an element's title and details using optimistic locking. The block must
        identify the element's existing block. Elements cannot be moved, reparented, or
        retyped. `parent_id` and `child_type`, when present, may only be null; non-null
        relationship changes return `422`.
      tags: [Business Model Elements]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessModelElementUpdateRequest"
      responses:
        "200":
          description: Updated complete Business Model Element document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessModelElementDocument"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /{workspace_slug}/business_models/{business_model_id}/elements/{element_id}/archival.json:
    parameters:
      - $ref: "#/components/parameters/WorkspaceSlug"
      - $ref: "#/components/parameters/BusinessModelId"
      - $ref: "#/components/parameters/ElementId"
    post:
      operationId: archiveBusinessModelElement
      summary: Archive an accepted business model element
      description: |
        Archives an accepted element using optimistic locking. Archiving preserves the
        element and its relationships as historical memory while removing it from current
        Business Model documents. Accepted children are archived with their parent. The
        archive reason is optional. Proposed elements must be rejected instead.
      tags: [Business Model Elements]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessModelElementArchivalRequest"
      responses:
        "204":
          description: Element archived. The response has no body.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /{workspace_slug}/business_models/{business_model_id}/elements/{element_id}/rejection.json:
    parameters:
      - $ref: "#/components/parameters/WorkspaceSlug"
      - $ref: "#/components/parameters/BusinessModelId"
      - $ref: "#/components/parameters/ElementId"
    delete:
      operationId: rejectBusinessModelElement
      summary: Reject a proposed business model element
      description: |
        Permanently deletes a proposed element using optimistic locking. Rejection is for
        proposals that never became accepted business knowledge. Accepted elements cannot
        be rejected and must be archived instead.
      tags: [Business Model Elements]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessModelElementRejectionRequest"
      responses:
        "204":
          description: Proposal rejected and permanently deleted. The response has no body.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /{workspace_slug}/business_models/{business_model_id}/environment.json:
    parameters:
      - $ref: "#/components/parameters/WorkspaceSlug"
      - $ref: "#/components/parameters/BusinessModelId"
    get:
      operationId: getBusinessModelEnvironment
      summary: Read a business model environment scope
      description: Returns the complete mutable scope of the Business Model's singular Environment.
      tags: [Business Model Environment]
      responses:
        "200":
          description: Complete Environment scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessModelEnvironmentDocument"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateBusinessModelEnvironment
      summary: Update a business model environment scope
      description: |
        Replaces the complete mutable Environment scope using optimistic locking. Both
        nullable scope fields and the latest `lock_version` must be sent.
      tags: [Business Model Environment]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessModelEnvironmentUpdateRequest"
      responses:
        "200":
          description: Updated complete Environment scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessModelEnvironmentDocument"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /{workspace_slug}/business_models/{business_model_id}/environment_items.json:
    parameters:
      - $ref: "#/components/parameters/WorkspaceSlug"
      - $ref: "#/components/parameters/BusinessModelId"
    get:
      operationId: listBusinessModelEnvironmentItems
      summary: Read focused business model environment items
      description: |
        Returns one bounded page for an explicit taxonomy topic, force, or `all` focus.
        The default `foundation` view contains accepted items. The `all` view also contains
        proposals and archived memory.
      tags: [Business Model Environment]
      parameters:
        - $ref: "#/components/parameters/EnvironmentView"
        - $ref: "#/components/parameters/EnvironmentFocus"
        - $ref: "#/components/parameters/EnvironmentPage"
      responses:
        "200":
          description: Focused Environment Items with taxonomy and pagination metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessModelEnvironmentItemCollection"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createBusinessModelEnvironmentItem
      summary: Create a proposed business model environment item
      description: |
        Creates a sourced AI-drafted proposal. Creates are not idempotent, must omit
        `lock_version`, and never accept the proposal as business knowledge.
      tags: [Business Model Environment]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessModelEnvironmentItemCreateRequest"
      responses:
        "201":
          description: Environment Item proposal created.
          headers:
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessModelEnvironmentItemDocument"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /{workspace_slug}/business_models/{business_model_id}/environment_items/{environment_item_id}.json:
    parameters:
      - $ref: "#/components/parameters/WorkspaceSlug"
      - $ref: "#/components/parameters/BusinessModelId"
      - $ref: "#/components/parameters/EnvironmentItemId"
    get:
      operationId: getBusinessModelEnvironmentItem
      summary: Read a business model environment item
      description: Returns the exact item representation, including archived memory.
      tags: [Business Model Environment]
      responses:
        "200":
          description: Complete Environment Item document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessModelEnvironmentItemDocument"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateBusinessModelEnvironmentItem
      summary: Update a proposed business model environment item
      description: |
        Replaces a sourced AI-drafted proposal using optimistic locking. Accepted and
        archived items cannot be updated. Item kind cannot change after creation.
      tags: [Business Model Environment]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessModelEnvironmentItemUpdateRequest"
      responses:
        "200":
          description: Updated complete Environment Item document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessModelEnvironmentItemDocument"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /{workspace_slug}/business_models/{business_model_id}/environment_items/{environment_item_id}/archival.json:
    parameters:
      - $ref: "#/components/parameters/WorkspaceSlug"
      - $ref: "#/components/parameters/BusinessModelId"
      - $ref: "#/components/parameters/EnvironmentItemId"
    post:
      operationId: archiveBusinessModelEnvironmentItem
      summary: Archive an accepted business model environment item
      description: |
        Archives accepted knowledge using optimistic locking. The item remains available
        through the all-records collection and individual item reads.
      tags: [Business Model Environment]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessModelEnvironmentItemArchivalRequest"
      responses:
        "204":
          description: Environment Item archived. The response has no body.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /{workspace_slug}/business_models/{business_model_id}/environment_items/{environment_item_id}/rejection.json:
    parameters:
      - $ref: "#/components/parameters/WorkspaceSlug"
      - $ref: "#/components/parameters/BusinessModelId"
      - $ref: "#/components/parameters/EnvironmentItemId"
    delete:
      operationId: rejectBusinessModelEnvironmentItem
      summary: Reject a proposed business model environment item
      description: |
        Permanently deletes a proposal using optimistic locking. Accepted items must be
        archived instead. Rejection never removes accepted business knowledge.
      tags: [Business Model Environment]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessModelEnvironmentItemRejectionRequest"
      responses:
        "204":
          description: Proposal rejected and permanently deleted. The response has no body.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /{workspace_slug}/business_models/{business_model_id}/streams.json:
    parameters:
      - $ref: "#/components/parameters/WorkspaceSlug"
      - $ref: "#/components/parameters/BusinessModelId"
    post:
      operationId: createBusinessModelStream
      summary: Create a business model stream
      description: |
        Creates a Stream in the selected Business Model. Creates are not idempotent and
        must omit `lock_version`. Read streams through the complete Business Model document.
      tags: [Business Model Streams]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessModelStreamCreateRequest"
      responses:
        "201":
          description: Business Model Stream created. No Location is returned because streams are read through their Business Model.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessModelStream"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /{workspace_slug}/business_models/{business_model_id}/streams/{stream_id}.json:
    parameters:
      - $ref: "#/components/parameters/WorkspaceSlug"
      - $ref: "#/components/parameters/BusinessModelId"
      - $ref: "#/components/parameters/StreamId"
    patch:
      operationId: updateBusinessModelStream
      summary: Update a business model stream
      description: |
        Replaces mutable Stream metadata using optimistic locking. Send the complete
        metadata set and `lock_version` from the latest Business Model read. Streams with
        accepted members require a separate human-approval operation and cannot be changed here.
      tags: [Business Model Streams]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessModelStreamUpdateRequest"
      responses:
        "200":
          description: Updated Business Model Stream.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessModelStream"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /{workspace_slug}/business_models/{business_model_id}/streams/{stream_id}/memberships.json:
    parameters:
      - $ref: "#/components/parameters/WorkspaceSlug"
      - $ref: "#/components/parameters/BusinessModelId"
      - $ref: "#/components/parameters/StreamId"
    post:
      operationId: addBusinessModelStreamMembership
      summary: Add an element to a business model stream
      description: |
        Adds one current top-level element and advances the Stream lock version. The
        element must belong to the same Business Model. Accepted elements and Streams
        containing accepted members require a separate human-approval operation.
      tags: [Business Model Streams]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessModelStreamMembershipCreateRequest"
      responses:
        "201":
          description: Membership created; returns the updated Stream with its new lock version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessModelStream"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /{workspace_slug}/business_models/{business_model_id}/streams/{stream_id}/memberships/{element_id}.json:
    parameters:
      - $ref: "#/components/parameters/WorkspaceSlug"
      - $ref: "#/components/parameters/BusinessModelId"
      - $ref: "#/components/parameters/StreamId"
      - $ref: "#/components/parameters/ElementId"
    delete:
      operationId: removeBusinessModelStreamMembership
      summary: Remove an element from a business model stream
      description: |
        Removes one membership and returns the updated Stream. The supplied lock version
        belongs to the Stream. Streams containing accepted members require a separate
        human-approval operation and cannot be changed here.
      tags: [Business Model Streams]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessModelStreamMembershipDeleteRequest"
      responses:
        "200":
          description: Membership removed; returns the updated Stream with its new lock version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessModelStream"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Strapivo personal access token
      description: |
        User-created personal access token. Workspace authorization is derived from the
        owning user's memberships. Tokens have no narrower scopes in V1.

  parameters:
    WorkspaceSlug:
      name: workspace_slug
      in: path
      required: true
      description: Slug selecting the workspace security boundary.
      schema:
        type: string
        minLength: 1
    BusinessModelId:
      name: business_model_id
      in: path
      required: true
      description: |
        Opaque Business Model path identifier. Use the `id` returned by the API or the
        canonical path returned in `Location`; do not infer its storage format.
      schema:
        type: string
        minLength: 1
    ElementId:
      name: element_id
      in: path
      required: true
      description: Opaque Business Model Element identifier.
      schema:
        type: string
        minLength: 1
    EnvironmentItemId:
      name: environment_item_id
      in: path
      required: true
      description: Opaque Business Model Environment Item identifier.
      schema:
        type: string
        format: uuid
    EnvironmentView:
      name: view
      in: query
      required: false
      description: Foundation returns accepted knowledge; all also returns proposals and archives.
      schema:
        type: string
        enum: [foundation, all]
        default: foundation
    EnvironmentFocus:
      name: focus
      in: query
      required: true
      description: Explicit taxonomy topic, force, or all-records focus.
      schema:
        $ref: "#/components/schemas/EnvironmentFocus"
    EnvironmentPage:
      name: page
      in: query
      required: false
      description: One-based page number. Environment Item pages contain five records.
      schema:
        type: integer
        minimum: 1
        maximum: 10000
        default: 1
    StreamId:
      name: stream_id
      in: path
      required: true
      description: Opaque Business Model Stream identifier.
      schema:
        type: string
        format: uuid

  headers:
    Location:
      description: Absolute URL of the newly created resource.
      required: true
      schema:
        type: string
        format: uri
    WwwAuthenticate:
      description: Bearer authentication challenge.
      required: true
      schema:
        type: string
        const: 'Bearer realm="Strapivo"'

  responses:
    BadRequest:
      description: Request parameters or JSON syntax are malformed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Bearer credentials are missing, malformed, or invalid.
      headers:
        WWW-Authenticate:
          $ref: "#/components/headers/WwwAuthenticate"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: The authenticated user is not a member of the selected workspace.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: The scoped resource is missing or inaccessible.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Conflict:
      description: The supplied optimistic-lock version is stale. The error is retryable after rereading.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    UnprocessableEntity:
      description: Validation failed or the requested mutation violates the resource contract.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/Error"

    Error:
      type: object
      additionalProperties: false
      required: [code, message, retryable]
      properties:
        code:
          type: string
          enum:
            - invalid_json
            - invalid_mutation
            - invalid_request
            - invalid_transition
            - lock_version_not_allowed
            - lock_version_required
            - not_found
            - stale_object
            - unauthorized
            - forbidden
            - validation_failed
          description: Stable machine-readable error code used by the contracted operations.
        message:
          type: string
          minLength: 1
          description: Human-readable explanation.
        retryable:
          type: boolean
          description: Whether rereading or retrying can safely resolve this specific failure.
        details:
          type: object
          description: Validation messages keyed by input or model attribute.
          additionalProperties:
            type: array
            items:
              type: string

    Workspace:
      type: object
      additionalProperties: false
      required: [id, name, slug, path, role, business_models_url]
      properties:
        id:
          type: string
          minLength: 1
          description: Opaque workspace identifier; clients must not infer its storage format.
        name:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        path:
          type: string
          pattern: ^/
          description: Workspace path prefix for workspace-scoped routes.
        role:
          type: string
          enum: [owner, admin, member]
        business_models_url:
          type: string
          format: uri
          description: Opaque absolute link to this workspace's Business Model directory.

    BusinessModelDirectoryEntry:
      type: object
      additionalProperties: false
      required: [id, name, updated_at]
      properties:
        id:
          $ref: "#/components/schemas/BusinessModelId"
        name:
          type: string
          minLength: 1
        updated_at:
          type: string
          format: date-time

    BusinessModelDocument:
      type: object
      additionalProperties: false
      required: [id, name, url, context_notes, lock_version, environment, blocks, streams]
      properties:
        id:
          $ref: "#/components/schemas/BusinessModelId"
        name:
          type: string
          minLength: 1
        url:
          type: [string, "null"]
          description: Primary Business Model URL, or null when absent.
        context_notes:
          type: [string, "null"]
          description: Supporting context notes, or null when absent.
        lock_version:
          $ref: "#/components/schemas/LockVersion"
        environment:
          $ref: "#/components/schemas/BusinessModelEnvironmentScope"
        blocks:
          $ref: "#/components/schemas/BusinessModelBlocks"
        streams:
          type: array
          items:
            $ref: "#/components/schemas/BusinessModelStream"

    BusinessModelEnvironmentScope:
      type: object
      additionalProperties: false
      required: [geography, primary_market]
      properties:
        geography:
          type: [string, "null"]
        primary_market:
          type: [string, "null"]

    BusinessModelEnvironmentDocument:
      type: object
      additionalProperties: false
      required: [business_model_id, geography, primary_market, lock_version]
      properties:
        business_model_id:
          $ref: "#/components/schemas/BusinessModelId"
        geography:
          type: [string, "null"]
          maxLength: 300
        primary_market:
          type: [string, "null"]
          maxLength: 300
        lock_version:
          $ref: "#/components/schemas/LockVersion"

    BusinessModelEnvironmentItemCollection:
      type: object
      additionalProperties: false
      required: [business_model_id, scope, view, focus, taxonomy, items, pagination]
      properties:
        business_model_id:
          $ref: "#/components/schemas/BusinessModelId"
        scope:
          $ref: "#/components/schemas/BusinessModelEnvironmentVersionedScope"
        view:
          type: string
          enum: [foundation, all]
        focus:
          $ref: "#/components/schemas/EnvironmentFocus"
        taxonomy:
          $ref: "#/components/schemas/BusinessModelEnvironmentTaxonomy"
        items:
          type: array
          maxItems: 5
          items:
            $ref: "#/components/schemas/BusinessModelEnvironmentItemSummary"
        pagination:
          $ref: "#/components/schemas/BusinessModelEnvironmentPagination"

    BusinessModelEnvironmentVersionedScope:
      type: object
      additionalProperties: false
      required: [geography, primary_market, lock_version]
      properties:
        geography:
          type: [string, "null"]
        primary_market:
          type: [string, "null"]
        lock_version:
          $ref: "#/components/schemas/LockVersion"

    BusinessModelEnvironmentTaxonomy:
      type: object
      additionalProperties: false
      required: [forces, topics]
      properties:
        forces:
          type: array
          items:
            $ref: "#/components/schemas/BusinessModelEnvironmentForce"
        topics:
          type: array
          items:
            $ref: "#/components/schemas/BusinessModelEnvironmentTopic"

    BusinessModelEnvironmentForce:
      type: object
      additionalProperties: false
      required: [key, label, details, evidence_window, preferred_evidence_window]
      properties:
        key:
          $ref: "#/components/schemas/EnvironmentForce"
        label:
          type: string
        details:
          type: string
        evidence_window:
          type: string
        preferred_evidence_window:
          type: string

    BusinessModelEnvironmentTopic:
      type: object
      additionalProperties: false
      required: [key, force, label, details, questions]
      properties:
        key:
          $ref: "#/components/schemas/EnvironmentTopic"
        force:
          $ref: "#/components/schemas/EnvironmentForce"
        label:
          type: string
        details:
          type: string
        questions:
          type: array
          items:
            type: string

    BusinessModelEnvironmentItemSummary:
      type: object
      additionalProperties: false
      required: [id, record_type, kind, topic, force, title, details, status, origin, label, support_signals, archive_reason, lock_version, caveats, truncated_fields]
      properties:
        id:
          $ref: "#/components/schemas/EnvironmentItemId"
        record_type:
          type: string
          const: business_model_environment_item
        kind:
          $ref: "#/components/schemas/EnvironmentItemKind"
        topic:
          $ref: "#/components/schemas/EnvironmentTopic"
        force:
          $ref: "#/components/schemas/EnvironmentForce"
        title:
          type: string
        details:
          type: string
        status:
          $ref: "#/components/schemas/EnvironmentItemStatus"
        origin:
          $ref: "#/components/schemas/EnvironmentItemOrigin"
        label:
          type: string
          enum: [accepted_foundation, open_proposal, archived_memory]
        support_signals:
          type: array
          maxItems: 3
          items:
            $ref: "#/components/schemas/EnvironmentItemSource"
        archive_reason:
          type: [string, "null"]
        lock_version:
          $ref: "#/components/schemas/LockVersion"
        caveats:
          type: array
          items:
            type: string
        truncated_fields:
          type: array
          items:
            type: string

    BusinessModelEnvironmentPagination:
      type: object
      additionalProperties: false
      required: [page, page_size, total_items, total_pages, more_items_beyond_page_limit]
      properties:
        page:
          type: integer
          minimum: 1
          maximum: 10000
        page_size:
          type: integer
          const: 5
        total_items:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0
          maximum: 10000
        more_items_beyond_page_limit:
          type: boolean

    BusinessModelEnvironmentItemDocument:
      type: object
      additionalProperties: false
      required: [id, business_model_id, kind, topic, force, title, details, status, origin, sources, archive_reason, position, lock_version]
      properties:
        id:
          $ref: "#/components/schemas/EnvironmentItemId"
        business_model_id:
          $ref: "#/components/schemas/BusinessModelId"
        kind:
          $ref: "#/components/schemas/EnvironmentItemKind"
        topic:
          $ref: "#/components/schemas/EnvironmentTopic"
        force:
          $ref: "#/components/schemas/EnvironmentForce"
        title:
          type: string
        details:
          type: string
        status:
          $ref: "#/components/schemas/EnvironmentItemStatus"
        origin:
          $ref: "#/components/schemas/EnvironmentItemOrigin"
        sources:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentItemSource"
        archive_reason:
          type: [string, "null"]
        position:
          type: integer
        lock_version:
          $ref: "#/components/schemas/LockVersion"

    EnvironmentItemSource:
      type: object
      additionalProperties: false
      required: [title, url]
      properties:
        title:
          type: string
        url:
          type: string

    EnvironmentItemResearchSource:
      type: object
      additionalProperties: false
      required: [title, url]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 300
        url:
          type: string
          format: uri
          minLength: 1
          maxLength: 1000

    BusinessModelStream:
      type: object
      additionalProperties: false
      required: [id, name, details, color, position, lock_version, members]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        details:
          type: [string, "null"]
        color:
          type: string
          enum: [yellow, blue, red, green, rose, purple, orange, cyan, indigo]
        position:
          type: integer
        lock_version:
          $ref: "#/components/schemas/LockVersion"
        members:
          type: array
          items:
            $ref: "#/components/schemas/BusinessModelStreamMember"

    BusinessModelStreamMember:
      type: object
      additionalProperties: false
      required: [element_id, block, title, status]
      properties:
        element_id:
          $ref: "#/components/schemas/ElementId"
        block:
          type: string
          enum: [customer_segments, value_propositions, channels, customer_relationships, revenue_streams, key_resources, key_activities, key_partners, cost_structure]
        title:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/CurrentElementStatus"

    BusinessModelBlocks:
      type: object
      additionalProperties: false
      required:
        - customer_segments
        - value_propositions
        - channels
        - customer_relationships
        - revenue_streams
        - key_resources
        - key_activities
        - key_partners
        - cost_structure
      properties:
        customer_segments:
          $ref: "#/components/schemas/CanvasBlock"
        value_propositions:
          $ref: "#/components/schemas/CanvasBlock"
        channels:
          $ref: "#/components/schemas/CanvasBlock"
        customer_relationships:
          $ref: "#/components/schemas/CanvasBlock"
        revenue_streams:
          $ref: "#/components/schemas/CanvasBlock"
        key_resources:
          $ref: "#/components/schemas/CanvasBlock"
        key_activities:
          $ref: "#/components/schemas/CanvasBlock"
        key_partners:
          $ref: "#/components/schemas/CanvasBlock"
        cost_structure:
          $ref: "#/components/schemas/CanvasBlock"

    CanvasBlock:
      type: array
      items:
        $ref: "#/components/schemas/BusinessModelCanvasElement"

    BusinessModelCanvasElement:
      type: object
      additionalProperties: false
      required: [id, title, details, status]
      properties:
        id:
          $ref: "#/components/schemas/ElementId"
        title:
          type: string
          minLength: 1
        details:
          type: [string, "null"]
        status:
          $ref: "#/components/schemas/CurrentElementStatus"

    BusinessModelElementDocument:
      type: object
      additionalProperties: false
      required: [id, title, details, status, lock_version, children]
      properties:
        id:
          $ref: "#/components/schemas/ElementId"
        title:
          type: string
          minLength: 1
        details:
          type: [string, "null"]
        status:
          $ref: "#/components/schemas/CurrentElementStatus"
        lock_version:
          $ref: "#/components/schemas/LockVersion"
        children:
          $ref: "#/components/schemas/BusinessModelElementChildren"

    BusinessModelElementChildren:
      type: object
      additionalProperties: false
      description: |
        Unarchived children grouped by child type. Only groups with children are present.
        Customer Segments may contain `jobs`, `pains`, and `gains`. Value Propositions may
        contain `product_services`, `pain_relievers`, and `gain_creators`.
      properties:
        jobs:
          $ref: "#/components/schemas/ElementChildren"
        pains:
          $ref: "#/components/schemas/ElementChildren"
        gains:
          $ref: "#/components/schemas/ElementChildren"
        product_services:
          $ref: "#/components/schemas/ElementChildren"
        pain_relievers:
          $ref: "#/components/schemas/ElementChildren"
        gain_creators:
          $ref: "#/components/schemas/ElementChildren"

    ElementChildren:
      type: array
      items:
        $ref: "#/components/schemas/BusinessModelElementChild"

    BusinessModelElementChild:
      type: object
      additionalProperties: false
      required: [id, title, details, status, lock_version]
      properties:
        id:
          $ref: "#/components/schemas/ElementId"
        title:
          type: string
          minLength: 1
        details:
          type: [string, "null"]
        status:
          $ref: "#/components/schemas/CurrentElementStatus"
        lock_version:
          $ref: "#/components/schemas/LockVersion"

    BusinessModelCreateRequest:
      description: Flat payload or the same payload wrapped under `business_model`.
      oneOf:
        - $ref: "#/components/schemas/BusinessModelCreatePayload"
        - type: object
          required: [business_model]
          properties:
            business_model:
              $ref: "#/components/schemas/BusinessModelCreatePayload"

    BusinessModelCreatePayload:
      type: object
      required: [name]
      not:
        required: [business_model]
      properties:
        name:
          type: string
          description: Required by domain validation; blank values return `422`.
        url:
          type: [string, "null"]
        context_notes:
          type: [string, "null"]

    BusinessModelUpdateRequest:
      description: Flat payload or the same payload wrapped under `business_model`.
      oneOf:
        - $ref: "#/components/schemas/BusinessModelUpdatePayload"
        - type: object
          required: [business_model]
          properties:
            business_model:
              $ref: "#/components/schemas/BusinessModelUpdatePayload"

    BusinessModelUpdatePayload:
      type: object
      required: [lock_version, name]
      not:
        required: [business_model]
      properties:
        lock_version:
          $ref: "#/components/schemas/LockVersion"
        name:
          type: string
          description: Required by domain validation; blank values return `422`.
        url:
          type: [string, "null"]
        context_notes:
          type: [string, "null"]

    BusinessModelElementCreateRequest:
      description: Flat payload or the same payload wrapped under `element`.
      oneOf:
        - $ref: "#/components/schemas/BusinessModelElementCreatePayload"
        - type: object
          required: [element]
          properties:
            element:
              $ref: "#/components/schemas/BusinessModelElementCreatePayload"

    BusinessModelElementCreatePayload:
      description: |
        A top-level element, a Customer Segment child, or a Value Proposition child.
        `lock_version` is not accepted on creates.
      not:
        anyOf:
          - required: [element]
          - required: [lock_version]
      oneOf:
        - $ref: "#/components/schemas/TopLevelElementCreatePayload"
        - $ref: "#/components/schemas/CustomerSegmentChildCreatePayload"
        - $ref: "#/components/schemas/ValuePropositionChildCreatePayload"

    TopLevelElementCreatePayload:
      type: object
      required: [block, title]
      properties:
        block:
          $ref: "#/components/schemas/CanvasBlockName"
        parent_id:
          type: "null"
          description: May be omitted or explicitly null for a top-level element.
        child_type:
          type: "null"
          description: May be omitted or explicitly null for a top-level element.
        title:
          type: string
        details:
          type: [string, "null"]

    CustomerSegmentChildCreatePayload:
      type: object
      required: [block, parent_id, child_type, title]
      properties:
        block:
          type: string
          const: customer_segments
        parent_id:
          $ref: "#/components/schemas/ElementId"
        child_type:
          type: string
          enum: [job, pain, gain]
        title:
          type: string
        details:
          type: [string, "null"]

    ValuePropositionChildCreatePayload:
      type: object
      required: [block, parent_id, child_type, title]
      properties:
        block:
          type: string
          const: value_propositions
        parent_id:
          $ref: "#/components/schemas/ElementId"
        child_type:
          type: string
          enum: [product_service, pain_reliever, gain_creator]
        title:
          type: string
        details:
          type: [string, "null"]

    BusinessModelElementUpdateRequest:
      description: Flat payload or the same payload wrapped under `element`.
      oneOf:
        - $ref: "#/components/schemas/BusinessModelElementUpdatePayload"
        - type: object
          required: [element]
          properties:
            element:
              $ref: "#/components/schemas/BusinessModelElementUpdatePayload"

    BusinessModelElementUpdatePayload:
      type: object
      required: [block, lock_version, title]
      not:
        required: [element]
      properties:
        block:
          $ref: "#/components/schemas/CanvasBlockName"
        lock_version:
          $ref: "#/components/schemas/LockVersion"
        title:
          type: string
        details:
          type: [string, "null"]
        parent_id:
          type: "null"
          description: Relationship changes are immutable; when supplied this must be null.
        child_type:
          type: "null"
          description: Type changes are immutable; when supplied this must be null.

    BusinessModelElementArchivalRequest:
      description: Flat payload or the same payload wrapped under `archival`.
      oneOf:
        - $ref: "#/components/schemas/BusinessModelElementArchivalPayload"
        - type: object
          required: [archival]
          properties:
            archival:
              $ref: "#/components/schemas/BusinessModelElementArchivalPayload"

    BusinessModelElementArchivalPayload:
      type: object
      required: [lock_version]
      not:
        required: [archival]
      properties:
        lock_version:
          $ref: "#/components/schemas/LockVersion"
        archive_reason:
          type: [string, "null"]
          description: Optional explanation preserved with the archived element.

    BusinessModelElementRejectionRequest:
      description: Flat payload or the same payload wrapped under `rejection`.
      oneOf:
        - $ref: "#/components/schemas/BusinessModelElementRejectionPayload"
        - type: object
          required: [rejection]
          properties:
            rejection:
              $ref: "#/components/schemas/BusinessModelElementRejectionPayload"

    BusinessModelElementRejectionPayload:
      type: object
      required: [lock_version]
      not:
        required: [rejection]
      properties:
        lock_version:
          $ref: "#/components/schemas/LockVersion"

    BusinessModelEnvironmentUpdateRequest:
      description: Flat payload or the same payload wrapped under `business_model_environment`.
      oneOf:
        - $ref: "#/components/schemas/BusinessModelEnvironmentUpdatePayload"
        - type: object
          required: [business_model_environment]
          properties:
            business_model_environment:
              $ref: "#/components/schemas/BusinessModelEnvironmentUpdatePayload"

    BusinessModelEnvironmentUpdatePayload:
      type: object
      required: [lock_version, geography, primary_market]
      not:
        required: [business_model_environment]
      properties:
        lock_version:
          $ref: "#/components/schemas/LockVersion"
        geography:
          type: [string, "null"]
          maxLength: 300
        primary_market:
          type: [string, "null"]
          maxLength: 300

    BusinessModelEnvironmentItemCreateRequest:
      description: Flat payload or the same payload wrapped under `environment_item`.
      oneOf:
        - $ref: "#/components/schemas/BusinessModelEnvironmentItemCreatePayload"
        - type: object
          required: [environment_item]
          properties:
            environment_item:
              $ref: "#/components/schemas/BusinessModelEnvironmentItemCreatePayload"

    BusinessModelEnvironmentItemCreatePayload:
      type: object
      required: [topic, title, details, sources]
      not:
        anyOf:
          - required: [environment_item]
          - required: [lock_version]
      properties:
        topic:
          $ref: "#/components/schemas/EnvironmentTopic"
        title:
          type: string
          minLength: 1
          maxLength: 300
        details:
          type: string
          minLength: 1
          maxLength: 2000
        sources:
          type: array
          minItems: 1
          maxItems: 3
          items:
            $ref: "#/components/schemas/EnvironmentItemResearchSource"

    BusinessModelEnvironmentItemUpdateRequest:
      description: Flat payload or the same payload wrapped under `environment_item`.
      oneOf:
        - $ref: "#/components/schemas/BusinessModelEnvironmentItemUpdatePayload"
        - type: object
          required: [environment_item]
          properties:
            environment_item:
              $ref: "#/components/schemas/BusinessModelEnvironmentItemUpdatePayload"

    BusinessModelEnvironmentItemUpdatePayload:
      type: object
      required: [lock_version, topic, title, details, sources]
      not:
        required: [environment_item]
      properties:
        lock_version:
          $ref: "#/components/schemas/LockVersion"
        topic:
          $ref: "#/components/schemas/EnvironmentTopic"
        title:
          type: string
          minLength: 1
          maxLength: 300
        details:
          type: string
          minLength: 1
          maxLength: 2000
        sources:
          type: array
          minItems: 1
          maxItems: 3
          items:
            $ref: "#/components/schemas/EnvironmentItemResearchSource"

    BusinessModelEnvironmentItemArchivalRequest:
      description: Flat payload or the same payload wrapped under `archival`.
      oneOf:
        - $ref: "#/components/schemas/BusinessModelEnvironmentItemArchivalPayload"
        - type: object
          required: [archival]
          properties:
            archival:
              $ref: "#/components/schemas/BusinessModelEnvironmentItemArchivalPayload"

    BusinessModelEnvironmentItemArchivalPayload:
      type: object
      required: [lock_version]
      not:
        required: [archival]
      properties:
        lock_version:
          $ref: "#/components/schemas/LockVersion"
        archive_reason:
          type: [string, "null"]

    BusinessModelEnvironmentItemRejectionRequest:
      description: Flat payload or the same payload wrapped under `rejection`.
      oneOf:
        - $ref: "#/components/schemas/BusinessModelEnvironmentItemRejectionPayload"
        - type: object
          required: [rejection]
          properties:
            rejection:
              $ref: "#/components/schemas/BusinessModelEnvironmentItemRejectionPayload"

    BusinessModelEnvironmentItemRejectionPayload:
      type: object
      required: [lock_version]
      not:
        required: [rejection]
      properties:
        lock_version:
          $ref: "#/components/schemas/LockVersion"

    BusinessModelStreamCreateRequest:
      description: Flat payload or the same payload wrapped under `stream`.
      oneOf:
        - $ref: "#/components/schemas/BusinessModelStreamCreatePayload"
        - type: object
          required: [stream]
          properties:
            stream:
              $ref: "#/components/schemas/BusinessModelStreamCreatePayload"

    BusinessModelStreamCreatePayload:
      type: object
      required: [name, details, color, position]
      not:
        anyOf:
          - required: [stream]
          - required: [lock_version]
      properties:
        name:
          type: string
          description: Required by domain validation; blank values return `422`.
        details:
          type: [string, "null"]
        color:
          type: string
          enum: [yellow, blue, red, green, rose, purple, orange, cyan, indigo]
        position:
          type: integer

    BusinessModelStreamUpdateRequest:
      description: Flat payload or the same payload wrapped under `stream`.
      oneOf:
        - $ref: "#/components/schemas/BusinessModelStreamUpdatePayload"
        - type: object
          required: [stream]
          properties:
            stream:
              $ref: "#/components/schemas/BusinessModelStreamUpdatePayload"

    BusinessModelStreamUpdatePayload:
      type: object
      required: [lock_version, name, details, color, position]
      not:
        required: [stream]
      properties:
        lock_version:
          $ref: "#/components/schemas/LockVersion"
        name:
          type: string
          description: Required by domain validation; blank values return `422`.
        details:
          type: [string, "null"]
        color:
          type: string
          enum: [yellow, blue, red, green, rose, purple, orange, cyan, indigo]
        position:
          type: integer

    BusinessModelStreamMembershipCreateRequest:
      description: Flat payload or the same payload wrapped under `membership`.
      oneOf:
        - $ref: "#/components/schemas/BusinessModelStreamMembershipCreatePayload"
        - type: object
