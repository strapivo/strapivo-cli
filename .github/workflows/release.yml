name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions: {}

jobs:
  remove-legacy-npm-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24.18.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Remove legacy next tag
        shell: bash
        run: |
          oidc_response="$(curl --fail --silent --show-error \
            --header "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org")"
          oidc_token="$(node -e 'process.stdout.write(JSON.parse(process.argv[1]).value)' "$oidc_response")"
          exchange_response="$(curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $oidc_token" \
            https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/%40strapivo%2Fcli)"
          npm_token="$(node -e 'process.stdout.write(JSON.parse(process.argv[1]).token)' "$exchange_response")"
          echo "::add-mask::$npm_token"
          npm dist-tag rm @strapivo/cli next \
            --//registry.npmjs.org/:_authToken="$npm_token"

  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      artifact: ${{ steps.package.outputs.artifact }}
      checksum: ${{ steps.package.outputs.checksum }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Verify tag matches package version
        run: |
          version="$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "v$version" || {
            echo "Tag $GITHUB_REF_NAME does not match package version $version"
            exit 1
          }
          [[ "$version" != *-* ]] || {
            echo "Only stable versions may be released"
            exit 1
          }

      - run: npm ci
      - run: npm run api:check
      - run: npm run check
      - run: npm test

      - name: Build release artifact
        id: package
        run: |
          version="$(node -p "require('./package.json').version")"
          artifact="release/strapivo-cli-$version.tgz"
          checksum="$artifact.sha256"

          mkdir release
          npm pack --pack-destination release
          test -f "$artifact"
          (cd release && sha256sum "$(basename "$artifact")" > "$(basename "$checksum")")

          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Verify packaged CLI and bundled skills
        run: npm run package:smoke -- "${{ steps.package.outputs.artifact }}"

      - name: Preserve tested release artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: release-package
          path: |
            ${{ steps.package.outputs.artifact }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 1

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24.18.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Restore tested release artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: release-package
          path: release

      - name: Verify release artifact checksum
        run: |
          cd release
          sha256sum --check "$(basename "${{ needs.build.outputs.checksum }}")"

      - name: Publish tested artifact to npm
        run: >-
          npm publish "./${{ needs.build.outputs.artifact }}"
          --access public
          --tag latest

  github-release:
    needs: [build, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Restore tested release artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: release-package
          path: release

      - name: Create GitHub release from tested artifact
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "${{ needs.build.outputs.artifact }}" \
            "${{ needs.build.outputs.checksum }}" \
            --verify-tag \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
